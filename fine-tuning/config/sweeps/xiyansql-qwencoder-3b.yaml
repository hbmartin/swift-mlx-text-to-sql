name: creg-sql-reliability-v3-xiyansql-qwencoder-3b-screening
description: Reliability-v3 18-run random screening after the controlled repair-ratio probe; promotion is eligibility-gated.
program: tools.run_experiment
method: random
run_cap: 18
metric:
  name: development/ex
  goal: maximize
command:
  - ${env}
  - ${interpreter}
  - -m
  - ${program}
  - --model-key=xiyansql-qwencoder-3b
  - --campaign-id=creg-sql-reliability-v3-xiyansql-qwencoder-3b-screening
  - --stage=screening
  - ${args}
parameters:
  seed:
    value: 424242
  repair-fraction:
    value: 0.20
  fine-tune-type:
    values: [lora, dora]
  trainable-layers:
    values: [last-16, all]
  rank:
    values: [4, 8, 16]
  scale-ratio:
    values: [1.0, 2.0, 2.5]
  dropout:
    values: [0.0, 0.05]
  learning-rate:
    distribution: log_uniform_values
    min: 0.00002
    max: 0.0002
  iterations:
    value: 600
